<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
    <form>
       
            <!-- Student Personal Information -->
         
                <legend><b>Student Personal Information</b></legend>
                <label>Full Name:</label><br>
                <input type="text" placeholder="Enter your full name"><br><br>
                <label>Father Name:</label><br>
                <input type="text" placeholder="Enter father name"><br><br>
                <label>CNIC / B-Form Number:</label><br>
                <input type="text" placeholder="Enter CNIC or B-Form number"><br><br>
                <label>Date of Birth:</label><br>
                <input type="date"><br><br>
                <label>Gender:</label><br>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Other
                <br><br>
                <label>Email Address:</label><br>
                <input type="email" placeholder="example@email.com"><br><br>
                <label>Phone Number:</label><br>
                <input type="tel" placeholder="03XXXXXXXXX"><br><br>
                <label>Address:</label><br>
                <input type="text" placeholder="Enter your address"><br><br>
                <label>City:</label><br>
                <input type="text" placeholder="Enter your city">
            <br><br>
            
         <!-- Academic Information -->
       
                <legend><b> Academic Information</b></legend>
                <label>Last Qualification:</label><br>
                <input type="text" placeholder="Enter qualification"><br><br>
                <label>School / College Name:</label><br>
                <input type="text" placeholder="Enter institute name"><br><br>
                <label>Percentage / Grade:</label><br>
                <input type="text" placeholder="Enter percentage or grade"><br><br>
                <label>Passing Year:</label><br>
                <input type="number" placeholder="Enter passing year">
            
            <br><br>
            <!-- Course Selection -->
            
                <legend><b> Course Selection</b></legend>
                <label>Course Name:</label><br>
                <select>
                    <option>Select Course</option>
                    <option>Web Development</option>
                    <option>Artificial Intelligence</option>
                    <option>Python Programming</option>
                    <option>Graphic Designing</option>
                </select>
                <br><br>
                <label>Course Timing:</label><br>
                <select>
                    <option>Select Timing</option>
                    <option>Morning</option>
                    <option>Afternoon</option>
                    <option>Evening</option>
                </select>
                <br><br>
                <label>Mode:</label><br>
                <input type="radio" name="mode"> Online
                <input type="radio" name="mode"> Physical
             <br><br>
            <!-- Guardian Information -->
           
                <legend><b>Guardian Information</b></legend>
                <label>Guardian Name:</label><br>
                <input type="text" placeholder="Enter guardian name"><br><br>
                <label>Relation:</label><br>
                <input type="text" placeholder="Father, Mother, Brother etc."><br><br>
                <label>Guardian Contact Number:</label><br>
                <input type="tel" placeholder="03XXXXXXXXX"><br><br>
                <label>Guardian Occupation:</label><br>
                <input type="text" placeholder="Enter occupation">
            
            <br><br>
            <!-- Account Information -->
        
                <legend><b>Account Information</b></legend>
                <label>Username:</label><br>
                <input type="text" placeholder="Enter username"><br><br>
                <label>Password:</label><br>
                <input type="password" placeholder="Enter password"><br><br>
                <label>Confirm Password:</label><br>
                <input type="password" placeholder="Confirm password">
                <br><br>
        
            
            <!-- Additional Elements -->
         
                <legend><b>Additional Elements</b></legend><br>
                <label>Upload Student Picture:</label><br>
                <input type="file"><br><br>
                <label>Upload Documents:</label><br>
                <input type="file"><br><br>
                <label>Message / Notes:</label><br>
                <textarea rows="5" cols="40" placeholder="Write your message here..."></textarea>
                <br><br>
                <input type="checkbox">
                I agree to the Terms & Conditions.
                <br><br>
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">



    </form>

</body>
</html>
